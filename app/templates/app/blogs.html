{% extends "app/layout.html" %}

{% block content %}

<h2 class="page-title">{{ title }}</h2>
{% if user.is_superuser %}
<a href="{% url 'newpost' %}" class="create-blog">
    Создать блог
</a>
{% endif %}

{% for post in posts %}

<div class="blog-post">
    <h2 class="post-title"> {{post.title}} </h2>
    <h4 class="post-date"> {{post.posted}} </h4>
    <p class="post-desc"> {{post.description}} </p>
    <p>
        <a href="{% url 'blogpost' parametr=post.id %}" class="read-more">
            Читать далее
        </a>
    </p>
</div>
{% endfor %}

{% endblock %}
